<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>BARROW</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0B0B10; }
      .app {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100%; min-height: 350px; font-family: 'Inter', sans-serif; color: #E8E0CE;
        padding: 16px; text-align: center;
      }
      .wordmark {
        font-family: 'Grenze Gotisch', serif; font-size: 48px; font-weight: 700;
        color: #E8A33D; letter-spacing: 4px; margin-bottom: 4px;
      }
      .tagline { font-size: 14px; color: #3E5C76; margin-bottom: 24px; }
      .day-info { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
      .meter-container {
        width: 200px; height: 8px; background: #1a1a24; border-radius: 4px;
        margin-bottom: 8px; overflow: hidden;
      }
      .meter-fill { height: 100%; background: #5C7A5A; border-radius: 4px; transition: width 0.3s; }
      .meter-label { font-size: 11px; color: #3E5C76; margin-bottom: 20px; }
      .cta {
        font-family: 'Grenze Gotisch', serif; font-size: 28px; font-weight: 700;
        color: #0B0B10; background: #E8A33D; border: none; padding: 12px 40px;
        cursor: pointer; border-radius: 4px; margin-bottom: 20px;
      }
      .cta:active { background: #C4501B; }
      .streak { font-size: 13px; color: #E8A33D; margin-bottom: 12px; }
      .deepest { font-size: 12px; color: #3E5C76; }
      .deepest span { color: #E8E0CE; }
      .logged-out { font-size: 11px; color: #3E5C76; margin-top: 16px; }
    </style>
  </head>
  <body class="app">
    <div class="wordmark">BARROW</div>
    <div class="tagline">The dungeon remembers.</div>
    <div class="day-info" id="day-info"></div>
    <div class="meter-container">
      <div class="meter-fill" id="meter-fill" style="width: 0%"></div>
    </div>
    <div class="meter-label" id="meter-label"></div>
    <button class="cta" id="start-button">Descend</button>
    <div class="streak" id="streak"></div>
    <div class="deepest" id="deepest"></div>
    <div class="logged-out" id="logged-out"></div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
